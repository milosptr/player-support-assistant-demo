databases:
  - name: psa-db
    plan: free
    databaseName: psa
    user: psa

services:
  - type: web
    name: psa
    plan: free
    runtime: docker
    repo: https://github.com/milosptr/player-support-assistant-demo
    branch: main
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: psa-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
