name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_psa
          POSTGRES_USER: psa
          POSTGRES_PASSWORD: psa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8

      - name: Lint Python
        run: |
          cd backend
          flake8 . --max-line-length=120 --exclude=migrations,__pycache__

      - name: Run Django tests
        env:
          DATABASE_URL: postgres://psa:psa@localhost:5432/test_psa
          DJANGO_SECRET_KEY: test-secret-key
        run: |
          cd backend
          python manage.py test

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint Frontend
        run: |
          cd frontend
          npx eslint src/ --max-warnings 0

      - name: Type Check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
